name: Release to R2

on:
  push:
    tags:
      - "v*.*.*"

# Security: keep the secret out of job-level env so it is only exposed
# to steps that need it. The boolean flag gates the `if:` checks below.
env:
  HAS_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY != '' }}

permissions:
  contents: write
  packages: read

jobs:
  version-guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Verify package.json version matches tag
        id: extract
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$PKG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($GITHUB_REF_NAME). Bump package.json before tagging."
            exit 1
          fi
          echo "→ package.json version matches tag: ${VERSION}"

  test:
    needs: version-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Install dependencies
        run: bun install

      - name: Generate embedded sqlite-vec extension
        run: bun run scripts/generate-vec-embed.ts linux x64

      - name: Run lint
        run: bun run lint

      - name: Run tests
        run: bun run test

  build-bundles:
    needs: [version-guard, test]
    env:
      VERSION: ${{ needs.version-guard.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform-key: linux-x64
          - os: ubuntu-24.04-arm
            platform-key: linux-arm64
          - os: macos-15-intel
            platform-key: darwin-x64
          - os: macos-latest
            platform-key: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Install dependencies
        run: bun install

      - name: Build bundle
        run: bun run scripts/build-bundle.ts

      - name: List bundle artifacts
        run: ls -lh prism-v*.tar.gz*

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.platform-key }}
          path: |
            prism-v*.tar.gz
            prism-v*.tar.gz.sha256
          if-no-files-found: error

  release:
    needs: [version-guard, build-bundles]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version-guard.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set CHANNEL
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-beta* ]]; then
            echo "CHANNEL=beta" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF_NAME}" == *-dev* ]]; then
            echo "CHANNEL=dev" >> "$GITHUB_ENV"
          else
            echo "CHANNEL=stable" >> "$GITHUB_ENV"
          fi
          echo "→ VERSION=${VERSION} CHANNEL=${CHANNEL}"

      - name: Sync package.json version
        run: |
          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));pkg.version=process.env.VERSION;fs.writeFileSync('package.json',JSON.stringify(pkg,null,2)+'\n');"
          echo "→ package.json version set to ${VERSION}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Install dependencies
        run: bun install

      - name: Download bundle artifacts
        uses: actions/download-artifact@v8
        with:
          path: bundles
          pattern: bundle-*
          merge-multiple: false

      - name: Generate embedded sqlite-vec extension
        run: bun run scripts/generate-vec-embed.ts linux x64

      - name: Build source tarball
        run: |
          TARBALL_NAME="prism-v${VERSION}.tar.gz"
          echo "Building ${TARBALL_NAME}"
          mkdir -p /tmp/prism-release
          tar -czf "/tmp/prism-release/${TARBALL_NAME}" \
            --warning=no-file-changed \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=bundles \
            --exclude=engine/sqlite-vec-embedded.ts \
            --exclude=.git \
            --exclude=*.db \
            --exclude=*.db-journal \
            --exclude=*.db-wal \
            --exclude=*.db-shm \
            --exclude=logs \
            --exclude=.env \
            --exclude=.env.* \
            --exclude=bench/tmp-audit \
            --exclude=.wrangler \
            --exclude=cloudflare/.wrangler \
            --exclude=.omo \
            --exclude=.rtk \
            --exclude=.opencode \
            .
          cp "/tmp/prism-release/${TARBALL_NAME}" "./${TARBALL_NAME}"
          ls -lh "${TARBALL_NAME}"

      - name: Generate SHA-256 for source tarball
        run: |
          TARBALL_NAME="prism-v${VERSION}.tar.gz"
          sha256sum "${TARBALL_NAME}" > "${TARBALL_NAME}.sha256"
          cat "${TARBALL_NAME}.sha256"

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp "prism-v${VERSION}.tar.gz" release-assets/
          cp "prism-v${VERSION}.tar.gz.sha256" release-assets/
          for dir in bundles/bundle-*/; do
            if [ -d "$dir" ]; then
              cp "$dir"/*.tar.gz release-assets/ 2>/dev/null || true
              cp "$dir"/*.tar.gz.sha256 release-assets/ 2>/dev/null || true
            fi
          done
          ls -lh release-assets/

      - name: Generate release manifest
        env:
          R2_BASE_URL: https://pub-2f55c98709e74d1d900b89ec20f8f1fc.r2.dev
          REQUIRE_ALL_BUNDLES: "true"
        run: |
          cd release-assets
          bun run ../scripts/generate-release-manifest.ts
          cd ..
          cp "release-assets/manifest.json" "manifest.json"
          cat manifest.json

      - name: Verify release manifest completeness
        run: |
          BUNDLE_COUNT=$(jq '.bundles | length' manifest.json)
          if [ "$BUNDLE_COUNT" -lt 4 ]; then
            echo "::error::Manifest has only ${BUNDLE_COUNT} platform bundles; expected 4"
            jq '.bundles | keys' manifest.json
            exit 1
          fi
          echo "✓ Manifest has ${BUNDLE_COUNT} platform bundles"

      - name: Sign tarball and bundles (GPG, optional)
        if: env.HAS_GPG_KEY == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --import
          for f in release-assets/prism-v${VERSION}*.tar.gz; do
            gpg --batch --yes --armor --detach-sign "$f"
          done

      - name: Upload source tarball to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler r2 object put "prism-backups/releases/v${VERSION}/prism-v${VERSION}.tar.gz" --file "prism-v${VERSION}.tar.gz" --remote

      - name: Upload source SHA-256 to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler r2 object put "prism-backups/releases/v${VERSION}/prism-v${VERSION}.tar.gz.sha256" --file "prism-v${VERSION}.tar.gz.sha256" --remote

      - name: Upload bundle tarballs to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for f in release-assets/prism-v${VERSION}-*.tar.gz; do
            [ -e "$f" ] || continue
            npx wrangler r2 object put "prism-backups/releases/v${VERSION}/$(basename "$f")" --file "$f" --remote
          done

      - name: Upload bundle SHA-256 checksums to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for f in release-assets/prism-v${VERSION}-*.tar.gz.sha256; do
            [ -e "$f" ] || continue
            npx wrangler r2 object put "prism-backups/releases/v${VERSION}/$(basename "$f")" --file "$f" --remote
          done

      - name: Upload GPG signatures to R2
        if: env.HAS_GPG_KEY == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for f in release-assets/prism-v${VERSION}*.tar.gz.asc; do
            [ -e "$f" ] || continue
            npx wrangler r2 object put "prism-backups/releases/v${VERSION}/$(basename "$f")" --file "$f" --remote
          done

      - name: Upload manifest to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          case "${CHANNEL}" in
            stable)
              MANIFEST_PATH="prism-backups/releases/latest.json"
              ;;
            beta)
              MANIFEST_PATH="prism-backups/releases/channel/beta.json"
              ;;
            dev)
              MANIFEST_PATH="prism-backups/releases/channel/dev.json"
              ;;
            *)
              echo "Unknown channel: ${CHANNEL}"
              exit 1
              ;;
          esac
          npx wrangler r2 object put "${MANIFEST_PATH}" --file manifest.json --remote

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSETS=$(ls release-assets/* | tr '\n' ' ')
          gh release create "${GITHUB_REF_NAME}" \
            --title "Release ${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag \
            ${ASSETS} \
            2>/dev/null || \
          gh release upload "${GITHUB_REF_NAME}" \
            release-assets/* \
            --clobber
