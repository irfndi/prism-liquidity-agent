name: Release to R2

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint

      - name: Run tests
        run: bun run test

      - name: Build tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TARBALL_NAME="prism-v${VERSION}.tar.gz"
          echo "Building ${TARBALL_NAME}"
          tar -czf "${TARBALL_NAME}" \
            --exclude=node_modules \
            --exclude=dist \
            --exclude=.git \
            --exclude=*.db \
            --exclude=*.db-journal \
            --exclude=*.db-wal \
            --exclude=*.db-shm \
            --exclude=logs \
            --exclude=.env \
            --exclude=.env.* \
            --exclude=bench/tmp-audit \
            --exclude=.wrangler \
            --exclude=cloudflare/.wrangler \
            --exclude=.omo \
            --exclude=.rtk \
            --exclude=.opencode \
            --exclude=bun.lock \
            --exclude=cloudflare/bun.lock \
            .
          ls -lh "${TARBALL_NAME}"

      - name: Generate SHA-256 checksum
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TARBALL_NAME="prism-v${VERSION}.tar.gz"
          sha256sum "${TARBALL_NAME}" > "${TARBALL_NAME}.sha256"
          cat "${TARBALL_NAME}.sha256"

      - name: Sign tarball (GPG, optional)
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TARBALL_NAME="prism-v${VERSION}.tar.gz"
          echo "$GPG_PRIVATE_KEY" | gpg --import
          gpg --batch --yes --armor --detach-sign "${TARBALL_NAME}"

      - name: Upload tarball to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npx wrangler r2 object put "prism-backups/releases/v${VERSION}/prism-v${VERSION}.tar.gz" --file "prism-v${VERSION}.tar.gz"

      - name: Upload SHA-256 to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npx wrangler r2 object put "prism-backups/releases/v${VERSION}/prism-v${VERSION}.tar.gz.sha256" --file "prism-v${VERSION}.tar.gz.sha256"

      - name: Upload GPG signature to R2
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npx wrangler r2 object put "prism-backups/releases/v${VERSION}/prism-v${VERSION}.tar.gz.asc" --file "prism-v${VERSION}.tar.gz.asc"

      - name: Update latest.json manifest
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TARBALL_URL="https://r2.prism-agent.com/releases/v${VERSION}/prism-v${VERSION}.tar.gz"
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "channel": "stable",
            "tarball_url": "${TARBALL_URL}",
            "sha256_url": "${TARBALL_URL}.sha256",
            "signature_url": "${TARBALL_URL}.asc",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "min_cli_version": "1.0.0"
          }
          EOF
          cat latest.json
          npx wrangler r2 object put "prism-backups/releases/latest.json" --file latest.json

      - name: Update beta channel manifest
        if: contains(github.ref, '-beta')
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TARBALL_URL="https://r2.prism-agent.com/releases/v${VERSION}/prism-v${VERSION}.tar.gz"
          cat > beta.json << EOF
          {
            "version": "${VERSION}",
            "channel": "beta",
            "tarball_url": "${TARBALL_URL}",
            "sha256_url": "${TARBALL_URL}.sha256",
            "signature_url": "${TARBALL_URL}.asc",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "min_cli_version": "1.0.0"
          }
          EOF
          npx wrangler r2 object put "prism-backups/releases/channel/beta.json" --file beta.json

      - name: Create GitHub Release (optional, for visibility)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            prism-v${{ github.ref_name }}.tar.gz
            prism-v${{ github.ref_name }}.tar.gz.sha256
