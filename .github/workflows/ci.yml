name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
      NODE_ENV: test
      ANTHROPIC_API_KEY: test-anthropic-key
      HELIUS_API_KEY: test-helius-key
      SOLANA_RPC_URL: https://example.com
      WALLET_PRIVATE_KEY: test-private-key
      LOG_LEVEL: error
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test
