name = "prism-telegram-bot-test"
main = "workers/telegram-bot/index.ts"
compatibility_date = "2026-07-20"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "prism-db"
database_id = "0657c2b3-fdea-4b33-b11b-8d0a7b27cbc8"

# KV Namespace
[[kv_namespaces]]
binding = "CACHE"
id = "78d7fb5d3fab494dbc8f2940e524f22d"

# Environment Variables (use HTTP for tests, service binding in production)
[vars]
API_BASE_URL = "https://prism-api.irfndi.workers.dev"

[observability]
enabled = false

[observability.logs]
enabled = true
