name = "prism-api"
main = "workers/api/index.ts"
compatibility_date = "2026-07-20"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "prism-db"
database_id = "0657c2b3-fdea-4b33-b11b-8d0a7b27cbc8"

# KV Namespace
[[kv_namespaces]]
binding = "CACHE"
id = "78d7fb5d3fab494dbc8f2940e524f22d"

# R2 Bucket
[[r2_buckets]]
binding = "BACKUPS"
bucket_name = "prism-backups"

# Vectorize Index
[[vectorize]]
binding = "MEMORY"
index_name = "prism-memory"

# Environment Variables
[vars]
ENVIRONMENT = "production"
TELEGRAM_WEBHOOK_URL = "https://prism-telegram-bot.irfndi.workers.dev/webhook"
# Base URL of the telegram-bot worker — the API pushes alert deliveries to
# {TELEGRAM_BOT_URL}/internal/deliver-alert (X-Bot-Api-Secret authenticated).
TELEGRAM_BOT_URL = "https://prism-telegram-bot.irfndi.workers.dev"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Secrets (set via wrangler secret put)
# wrangler secret put FEE_WALLET_ADDRESS
# wrangler secret put TELEGRAM_BOT_TOKEN
# wrangler secret put ADMIN_API_KEY
# wrangler secret put BOT_API_SECRET   # shared with the telegram-bot worker (X-Bot-Api-Secret)

# Staging environment
[env.staging]
name = "prism-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "prism-db-staging"
database_id = "REPLACE_WITH_STAGING_DATABASE_ID"
